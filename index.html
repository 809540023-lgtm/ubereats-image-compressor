<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uber Eats 圖片壓縮工具 (台灣)</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(135deg, #06C167 0%, #00a050 100%);
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    color: #333;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  h1 {
    margin: 0 0 8px;
    font-size: 26px;
    color: #06C167;
  }
  .subtitle {
    color: #666;
    margin-bottom: 24px;
    font-size: 14px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 20px;
    padding: 16px;
    background: #f5f7fa;
    border-radius: 12px;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .control-group label {
    font-size: 12px;
    color: #555;
    font-weight: 600;
  }
  .control-group input, .control-group select {
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    width: 140px;
  }
  .dropzone {
    border: 3px dashed #06C167;
    border-radius: 16px;
    padding: 60px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #f0fff7;
  }
  .dropzone:hover, .dropzone.dragover {
    background: #e0ffec;
    border-color: #00a050;
    transform: scale(1.01);
  }
  .dropzone p {
    margin: 8px 0;
    color: #555;
  }
  .dropzone .big {
    font-size: 20px;
    font-weight: 600;
    color: #06C167;
  }
  .dropzone .small {
    font-size: 13px;
    color: #888;
  }
  #fileInput { display: none; }
  .actions {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  button {
    background: #06C167;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s;
  }
  button:hover { background: #00a050; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  button.secondary { background: #888; }
  button.secondary:hover { background: #666; }
  .results {
    margin-top: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .card {
    border: 1px solid #eee;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    background: #f5f5f5;
  }
  .card-info {
    padding: 10px 12px;
    font-size: 12px;
  }
  .card-info .name {
    font-weight: 600;
    color: #333;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-info .meta {
    color: #888;
    font-size: 11px;
    margin-bottom: 8px;
  }
  .card-info .meta .arrow { color: #06C167; }
  .card-info button {
    width: 100%;
    padding: 6px;
    font-size: 12px;
  }
  .spec-info {
    background: #fff8e1;
    border-left: 4px solid #ffa726;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    color: #5d4037;
    margin-bottom: 20px;
  }
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    color: #aaa;
    padding: 40px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🍔 Uber Eats 圖片壓縮工具</h1>
  <p class="subtitle">自動將圖片調整為符合 Uber Eats 台灣的尺寸規格</p>

  <div class="spec-info">
    <strong>📏 Uber Eats 圖片規格：</strong>寬高皆需介於 320 ~ 6000 像素之間。本工具會將圖片縮放並裁切成正方形，符合餐點圖片建議。
  </div>

  <div class="controls">
    <div class="control-group">
      <label>輸出尺寸 (px)</label>
      <select id="outputSize">
        <option value="1200">1200 × 1200 (推薦)</option>
        <option value="2000">2000 × 2000 (高畫質)</option>
        <option value="800">800 × 800</option>
        <option value="500">500 × 500</option>
        <option value="320">320 × 320 (最小)</option>
      </select>
    </div>
    <div class="control-group">
      <label>輸出格式</label>
      <select id="outputFormat">
        <option value="image/jpeg">JPEG (檔案小)</option>
        <option value="image/png">PNG (無壓縮)</option>
        <option value="image/webp">WebP</option>
      </select>
    </div>
    <div class="control-group">
      <label>JPEG 品質 (1-100)</label>
      <input type="number" id="quality" value="90" min="1" max="100">
    </div>
    <div class="control-group">
      <label>背景色 (透明補白)</label>
      <input type="color" id="bgColor" value="#ffffff">
    </div>
  </div>

  <div class="dropzone" id="dropzone">
    <p class="big">📤 拖放圖片到這裡</p>
    <p>或</p>
    <p><button type="button">選擇檔案</button></p>
    <p class="small">支援 JPG / PNG / WebP，可一次選多張</p>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>

  <div class="actions">
    <button id="downloadAll" disabled>📦 全部下載 (ZIP)</button>
    <button id="clearAll" class="secondary" disabled>🗑️ 清空</button>
  </div>

  <div class="results" id="results">
    <div class="empty">尚未處理任何圖片</div>
  </div>
</div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const results = document.getElementById('results');
const downloadAllBtn = document.getElementById('downloadAll');
const clearAllBtn = document.getElementById('clearAll');

const processed = [];

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropzone.classList.add('dragover');
});
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

clearAllBtn.addEventListener('click', () => {
  processed.length = 0;
  results.innerHTML = '<div class="empty">尚未處理任何圖片</div>';
  downloadAllBtn.disabled = true;
  clearAllBtn.disabled = true;
});

async function handleFiles(files) {
  const fileArr = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (fileArr.length === 0) return;

  if (results.querySelector('.empty')) {
    results.innerHTML = '';
  }

  for (const file of fileArr) {
    try {
      const result = await processImage(file);
      processed.push(result);
      addCard(result);
    } catch (err) {
      console.error('處理失敗：', file.name, err);
      alert('處理失敗：' + file.name + '\n' + err.message);
    }
  }

  downloadAllBtn.disabled = processed.length === 0;
  clearAllBtn.disabled = processed.length === 0;
}

function processImage(file) {
  return new Promise((resolve, reject) => {
    const size = parseInt(document.getElementById('outputSize').value);
    const format = document.getElementById('outputFormat').value;
    const quality = parseInt(document.getElementById('quality').value) / 100;
    const bgColor = document.getElementById('bgColor').value;

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // 填背景色（防止 PNG 透明變黑）
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, size, size);

        // 中央裁切：取最短邊
        const srcSize = Math.min(img.width, img.height);
        const srcX = (img.width - srcSize) / 2;
        const srcY = (img.height - srcSize) / 2;

        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, srcX, srcY, srcSize, srcSize, 0, 0, size, size);

        canvas.toBlob((blob) => {
          if (!blob) return reject(new Error('轉檔失敗'));
          const ext = format.split('/')[1].replace('jpeg', 'jpg');
          const baseName = file.name.replace(/\.[^.]+$/, '');
          const newName = `${baseName}_ubereats_${size}.${ext}`;
          resolve({
            originalName: file.name,
            newName,
            blob,
            url: URL.createObjectURL(blob),
            originalSize: file.size,
            newSize: blob.size,
            originalDim: `${img.width}×${img.height}`,
            newDim: `${size}×${size}`,
          });
        }, format, quality);
      };
      img.onerror = () => reject(new Error('無法讀取圖片'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('檔案讀取失敗'));
    reader.readAsDataURL(file);
  });
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(2) + ' MB';
}

function addCard(result) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <img src="${result.url}" alt="${result.newName}">
    <div class="card-info">
      <div class="name" title="${result.newName}">${result.newName}</div>
      <div class="meta">
        ${result.originalDim} → <span class="arrow">${result.newDim}</span><br>
        ${fmtSize(result.originalSize)} → ${fmtSize(result.newSize)}
      </div>
      <button data-url="${result.url}" data-name="${result.newName}">⬇️ 下載</button>
    </div>
  `;
  card.querySelector('button').addEventListener('click', () => {
    downloadBlob(result.blob, result.newName);
  });
  results.appendChild(card);
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 100);
}

downloadAllBtn.addEventListener('click', async () => {
  if (processed.length === 0) return;
  if (processed.length === 1) {
    downloadBlob(processed[0].blob, processed[0].newName);
    return;
  }
  // 多張：逐一觸發下載
  for (const r of processed) {
    downloadBlob(r.blob, r.newName);
    await new Promise(res => setTimeout(res, 200));
  }
});
</script>
</body>
</html>
